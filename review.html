<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXA - Review Jawaban</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #ffffff, #f5e9e9);
        padding: 20px;
      }

      .box {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        font-family: "Poppins", sans-serif;
        color: #800000;
        margin-bottom: 10px;
      }

      .summary {
        text-align: center;
        margin-bottom: 20px;
        font-size: 16px;
        color: #555;
      }

      .score {
        font-size: 28px;
        font-weight: bold;
        color: #800000;
      }

      .soal {
        margin-bottom: 25px;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #eee;
      }

      .jawaban {
        margin-top: 10px;
      }

      .opsi {
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 5px;
      }

      .user {
        border: 2px solid #ff9800;
        background: #fff3e0;
      }

      .benar {
        border: 2px solid #4caf50;
        background: #e8f5e9;
      }

      .salah {
        border: 2px solid #f44336;
        background: #ffebee;
      }

      .label {
        font-size: 13px;
        font-weight: bold;
        margin-left: 5px;
      }

      .explain {
        margin-top: 10px;
        font-size: 14px;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        color: #444;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>NEXA REVIEW</h2>

      <div class="summary">
        Skor kamu:
        <div class="score" id="nilai"></div>
      </div>

      <div id="review"></div>
    </div>

    <script>
      const soal = JSON.parse(localStorage.getItem("bankSoal")) || [];
      const jawaban = JSON.parse(localStorage.getItem("jawabanUser")) || {};
      const nilai = localStorage.getItem("nilai") || 0;

      document.getElementById("nilai").textContent = nilai;

      let html = "";

      soal.forEach((s, i) => {
        let user = jawaban[i];
        let kunci = s.j;

        html += `
        <div class="soal">
          <p><b>${i + 1}. ${s.t}</b></p>

          <div class="jawaban">
            ${s.p
              .map((opsi, j) => {
                let className = "opsi";

                if (j === kunci) className += " benar";
                if (j === user && user !== kunci) className += " salah";
                if (j === user) className += " user";

                return `
                <div class="${className}">
                  ${opsi}
                  ${
                    j === user
                      ? '<span class="label">(Jawaban kamu)</span>'
                      : ""
                  }
                  ${j === kunci ? '<span class="label">(Kunci)</span>' : ""}
                </div>
                `;
              })
              .join("")}
          </div>

          <div class="explain">
            <b>Pembahasan:</b> ${s.e}
          </div>
        </div>
        `;
      });

      document.getElementById("review").innerHTML = html;
    </script>
  </body>
</html>
