<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXA - Hasil Tryout TWK</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #ffffff, #f5e9e9);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .result-card {
        background: white;
        width: 100%;
        max-width: 420px;
        padding: 30px 25px;
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        animation: fadeIn 0.6s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        width: 80px;
        margin-bottom: 10px;
      }

      h2 {
        font-family: "Poppins", sans-serif;
        color: #800000;
        margin-bottom: 5px;
      }

      .sub {
        font-size: 14px;
        color: #777;
        margin-bottom: 20px;
      }

      .data {
        text-align: left;
        margin-bottom: 15px;
      }

      .data div {
        margin-bottom: 6px;
        font-size: 14px;
      }

      .data span {
        font-weight: 600;
        color: #333;
      }

      /* SCORE */
      .score-box {
        background: linear-gradient(135deg, #800000, #b00000);
        color: white;
        border-radius: 16px;
        padding: 20px 10px;
        margin: 20px 0;
      }

      .score {
        font-family: "Poppins", sans-serif;
        font-size: 48px;
        font-weight: 700;
      }

      .grade {
        font-size: 18px;
        margin-top: 5px;
        font-weight: 600;
      }

      /* FEEDBACK */
      .feedback {
        font-size: 14px;
        margin-top: 10px;
        color: #444;
      }

      /* BUTTON */
      .btn {
        background: linear-gradient(135deg, #800000, #5a0000);
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(128, 0, 0, 0.4);
      }

      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="result-card">
      <img src="img/Logo-1.png" class="logo" />

      <h2>NEXA TRYOUT RESULT</h2>
      <div class="sub">Simulasi Seleksi Paskibraka 2026</div>

      <!-- DATA -->
      <div class="data">
        <div>Nama: <span id="n"></span></div>
        <div>Sekolah: <span id="s"></span></div>
        <div>Kab/Kota: <span id="d"></span></div>
      </div>

      <!-- SCORE -->
      <div class="score-box">
        <div class="score" id="v">0</div>
        <div class="grade" id="g">-</div>
      </div>

      <div class="feedback" id="f"></div>

      <!-- BUTTON -->
      <button class="btn" onclick="lihatPembahasan()">Lihat Pembahasan</button>

      <div class="footer">NEXA • Paskibraka Training Platform</div>
    </div>

    <script>
      const nama = localStorage.getItem("nama") || "-";
      const sekolah = localStorage.getItem("sekolah") || "-";
      const daerah = localStorage.getItem("daerah") || "-";
      const nilai = parseInt(localStorage.getItem("nilai") || "0");

      document.getElementById("n").textContent = nama;
      document.getElementById("s").textContent = sekolah;
      document.getElementById("d").textContent = daerah;
      document.getElementById("v").textContent = nilai;

      // 🎯 GRADE SYSTEM
      let grade = "";
      let feedback = "";

      if (nilai >= 85) {
        grade = "A (Sangat Siap!)";
        feedback =
          "Level kamu sudah sangat siap. Tinggal konsistensi dan jaga mental!";
      } else if (nilai >= 70) {
        grade = "B (Siap)";
        feedback =
          "Sudah bagus, tapi masih ada beberapa materi yang perlu diperkuat.";
      } else if (nilai >= 50) {
        grade = "C (Perlu Latihan)";
        feedback =
          "Kamu perlu latihan lebih intens, terutama pemahaman konsep TWK.";
      } else {
        grade = "D (Perlu Pembinaan)";
        feedback = "Mulai dari dasar lagi, fokus ke Pancasila & sejarah.";
      }

      document.getElementById("g").textContent = grade;
      document.getElementById("f").textContent = feedback;

      function lihatPembahasan() {
        window.open("pembahasan.html", "_blank");
      }
    </script>
  </body>
</html>
